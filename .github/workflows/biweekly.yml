name: Biweekly HK Report

on:
  schedule:
    # 1st and 15th of each month, 01:00 UTC (09:00 HKT)
    - cron: '0 1 1,15 * *'
  workflow_dispatch:
    inputs:
      period:
        description: 'Explicit period (YYYY.MM.DD-MM.DD); blank = prev_end+1d to today'
        required: false
        default: ''
      skip_collect:
        description: 'Reuse existing snapshots/ (skip collect.py)'
        type: boolean
        default: false

permissions:
  contents: write   # required so the auto-commit step can push back to main

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Setup Node 20 (for surge)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Generate issue
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY:    ${{ secrets.TAVILY_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.period }}" ]; then
            ARGS="$ARGS --period ${{ inputs.period }}"
          fi
          if [ "${{ inputs.skip_collect }}" = "true" ]; then
            ARGS="$ARGS --skip-collect"
          fi
          python scripts/generate.py $ARGS

      - name: Deploy to Surge
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: python scripts/deploy.py

      - name: Commit generated artifacts
        run: |
          git config user.name  "hkreport-bot"
          git config user.email "actions@users.noreply.github.com"
          git add reports/ snapshots/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "auto: issue $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: report-artifacts-${{ github.run_id }}
          path: |
            reports/
            snapshots/
          retention-days: 14
