# Competitive Intel Tracker - Data Sources Configuration
# Last updated: 2026-04-04
# Data Layer Strategy:
#   Layer 1 = local files/snapshots  (fastest, most reliable)
#   Layer 2 = CLI tools / REST APIs  (iTunes API, curl)
#   Layer 3 = direct HTTP scrape     (static HTML pages)
#   Layer 5 = Firecrawl API          (JS-rendered SPAs)

# ============================================================
# REGULATORY SOURCES (一手源 — 直接訂閱，不用二手解讀)
# ============================================================
regulatory:
  sfc_news:
    name: "SFC News & Announcements"
    url: "https://www.sfc.hk/en/News-and-announcements/News"
    type: scrape_json
    frequency: daily
    priority: T0
    schema:
      extract: "latest 15 news items with dates, titles, and URLs"
    triggers:
      - pattern: "licen"     # license, licensed, licensing
        urgency: 24h
      - pattern: "virtual asset"
        urgency: 48h
      - pattern: "stablecoin"
        urgency: 24h
      - pattern: "consultation"
        urgency: 72h
      - pattern: "margin"
        urgency: 48h

  sfc_circulars:
    name: "SFC Circulars"
    url: "https://www.sfc.hk/en/Rules-and-standards/Circulars"
    type: scrape_json
    frequency: daily
    priority: T0

  sfc_policy:
    name: "SFC Policy Statements"
    url: "https://www.sfc.hk/en/News-and-announcements/Policy-statements-and-announcements"
    type: scrape_json
    frequency: daily
    priority: T0

  hkma_press:
    name: "HKMA Press Releases"
    url: "https://www.hkma.gov.hk/eng/news-and-media/press-releases"
    type: scrape_json
    frequency: daily
    priority: T0
    filter_out:
      - "Exchange Fund Bills Tender"
      - "Scam alert"
    triggers:
      - pattern: "sandbox"
        urgency: 48h
      - pattern: "stablecoin"
        urgency: 24h
      - pattern: "e-HKD"
        urgency: 72h
      - pattern: "virtual asset"
        urgency: 48h

  hkma_fintech_sandbox:
    name: "HKMA Fintech Supervisory Sandbox"
    url: "https://www.hkma.gov.hk/eng/key-functions/international-financial-centre/fintech/fintech-supervisory-sandbox-fss"
    type: scrape_diff
    frequency: weekly
    priority: T1

  hkex_news:
    name: "HKEX Regulatory Announcements"
    url: "https://www.hkex.com.hk/News/Regulatory-Announcements"
    type: scrape_json
    frequency: weekly
    priority: T1

# ============================================================
# COMPETITOR FEE/RATE PAGES (P0 — 融資利率定價)
# ============================================================
competitor_rates:
  futu_fees:
    name: "Futu HK Commission & Fees"
    url: "https://www.futuhk.com/en/commissionnew"
    type: firecrawl_scrape          # Layer 5 — JS-rendered SPA
    frequency: daily
    priority: P0
    wait_for: 5000
    watch_fields:
      - "Margin Rate"
      - "Commission"
    schema:
      extract: "all commission rates, margin rates, and financing interest rates"
    triggers:
      - field: "margin_rate_hkd"
        baseline: "6.8%"
        urgency: 24h
      - field: "margin_rate_usd"
        baseline: "4.8%"
        urgency: 24h

  futu_margin:
    name: "Futu HK Margin Details"
    url: "https://www.futuhk.com/en/products/margin"
    type: firecrawl_scrape          # Layer 5 — JS-rendered SPA
    frequency: daily
    priority: P0
    wait_for: 5000

  tiger_fees:
    name: "Tiger Brokers HK Fees"
    url: "https://www.itiger.com/hk/en/commissions/fees/stocks_etf"
    type: firecrawl_scrape          # Layer 5 — JS-rendered SPA
    frequency: daily
    priority: P0
    wait_for: 5000
    watch_fields:
      - "margin"
      - "commission"
    triggers:
      - field: "margin_rate_hkd"
        baseline: "6.8%"
        urgency: 24h
      - field: "margin_rate_usd"
        baseline: "4.8%"
        urgency: 24h

  tiger_margin:
    name: "Tiger Brokers Margin Account"
    url: "https://www.itiger.com/hk/en/invest/margin-account"
    type: firecrawl_scrape          # Layer 5 — JS-rendered SPA
    frequency: daily
    priority: P0
    wait_for: 5000

  longbridge_fees:
    name: "Longbridge HK Fees"
    url: "https://support.longbridge.hk/topics/hkmarket/rpop8q?locale=en"
    type: firecrawl_scrape          # Layer 5 — JS-rendered SPA
    frequency: daily
    priority: P0
    wait_for: 5000
    baseline_notes: "Platform Fee 15 HKD/order, Margin interest 6.50%"

